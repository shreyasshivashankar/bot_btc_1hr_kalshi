# ============================================================================
# bot_btc_1hr_kalshi — Cloud Run service manifest (Knative spec)
# ============================================================================
# This file documents the service configuration. The canonical deploy path is
# `gcloud run deploy` with the flags in docs/DEPLOYMENT.md §2.3 — this YAML is
# for reference and for GitOps-style replay if we adopt one later.
#
# `${PROJECT_ID}` and `${REGION}` below are placeholders — resolve them at
# deploy time against the same env vars setup_gcp.sh uses. Two options:
#
# With envsubst (brew install gettext):
#   PROJECT_ID=$BOT_BTC_1HR_KALSHI_GCP_PROJECT REGION=$BOT_BTC_1HR_KALSHI_GCP_REGION \
#     envsubst < deploy/cloudrun.yaml | \
#     gcloud run services replace - --region=$BOT_BTC_1HR_KALSHI_GCP_REGION
#
# With sed (always available):
#   sed -e "s|\${PROJECT_ID}|$BOT_BTC_1HR_KALSHI_GCP_PROJECT|g" \
#       -e "s|\${REGION}|$BOT_BTC_1HR_KALSHI_GCP_REGION|g" \
#       deploy/cloudrun.yaml | \
#     gcloud run services replace - --region=$BOT_BTC_1HR_KALSHI_GCP_REGION
# ============================================================================

apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: bot-btc-1hr-kalshi
  annotations:
    # Zero-trust: ingress=all relies on IAM (run.invoker) + the app-layer
    # X-Admin-Token bearer for defense-in-depth. GFE drops un-authenticated
    # requests with 403 before they reach the container. Setting ingress to
    # `internal-*` without also fronting the service with a VPC/GCLB only
    # breaks ops tooling — it doesn't add a real security layer for a
    # single-operator Cloud Run service.
    run.googleapis.com/ingress: all
  labels:
    app: bot-btc-1hr-kalshi
    tier: trading
spec:
  template:
    metadata:
      annotations:
        # Single-writer: exactly one instance.
        autoscaling.knative.dev/minScale: "1"
        autoscaling.knative.dev/maxScale: "1"

        # CPU always allocated — event loop needs to run between HTTP requests.
        run.googleapis.com/cpu-throttling: "false"

        # Gen2 execution environment (full Linux compat for uvloop/numba).
        run.googleapis.com/execution-environment: gen2

        # Faster cold start on deploy.
        run.googleapis.com/startup-cpu-boost: "true"
    spec:
      serviceAccountName: bot-btc-1hr-kalshi-runtime@${PROJECT_ID}.iam.gserviceaccount.com
      timeoutSeconds: 3600
      containerConcurrency: 10

      # Kalshi's RSA-PSS private key is mounted as a file (not an env var)
      # so multi-line PEM content survives intact. The application reads the
      # path from BOT_BTC_1HR_KALSHI_PRIVATE_KEY_PATH. Same pattern locally:
      # env var points at a PEM file on disk.
      volumes:
        - name: kalshi-private-key
          secret:
            secretName: BOT_BTC_1HR_KALSHI_PRIVATE_KEY
            items:
              - key: latest
                path: kalshi-private-key

        # Tick archive — GCS FUSE mount. ArchiveWriter writes
        # events-YYYY-MM-DDTHH.jsonl files; hour-roll close() finalizes
        # each object in the bucket (no per-line flushes, see
        # archive/writer.py docstring).
        #
        # uid/gid match the Dockerfile's non-root user (uid=10001).
        # Without these the inode is root-owned and the app gets EACCES.
        # implicit-dirs is required because GCS has no real directory
        # inodes — ArchiveWriter.__init__ calls mkdir(parents=True,
        # exist_ok=True) which would otherwise fail.
        #
        # Runtime service account needs roles/storage.objectAdmin on
        # bot-btc-1hr-kalshi-tick-archive-${PROJECT_ID}. See DEPLOYMENT.md.
        - name: tick-archive
          csi:
            driver: gcsfuse.run.googleapis.com
            readOnly: false
            volumeAttributes:
              bucketName: bot-btc-1hr-kalshi-tick-archive-${PROJECT_ID}
              mountOptions: "uid=10001,gid=10001,implicit-dirs"

      # Cloud Run managed gives a fixed 10s SIGTERM→SIGKILL window per the
      # container-runtime contract and rejects the Knative
      # `terminationGracePeriodSeconds` field at parse time. Our system is
      # required to be safe to die in 10 seconds: any order the IOC ladder
      # has started but not finished is recovered via the OMS
      # `ABANDONED_TO_SETTLEMENT` ledger state on next boot — capital stays
      # locked in Kalshi's settlement engine, portfolio reconciles on restart.
      containers:
        - name: bot-btc-1hr-kalshi
          image: ${REGION}-docker.pkg.dev/${PROJECT_ID}/bot-btc-1hr-kalshi/bot-btc-1hr-kalshi:latest
          ports:
            - name: http1
              containerPort: 8080
          resources:
            limits:
              cpu: "2"
              memory: "2Gi"

          volumeMounts:
            - name: kalshi-private-key
              mountPath: /secrets/kalshi
              readOnly: true
            - name: tick-archive
              mountPath: /app/data/archive

          # Non-secret config — sync with deploy/env.example.yaml
          env:
            - name: BOT_BTC_1HR_KALSHI_MODE
              value: paper
            - name: BOT_BTC_1HR_KALSHI_ENV
              value: prod
            - name: BOT_BTC_1HR_KALSHI_GCP_PROJECT
              value: ${PROJECT_ID}
            - name: BOT_BTC_1HR_KALSHI_GCP_REGION
              value: ${REGION}

            # Kalshi feed endpoints. paper.yaml / live.yaml reference these
            # via `ws_url_env` / `rest_url_env` — without them the feed loop
            # halts at boot with feedloop.missing_config.
            - name: BOT_BTC_1HR_KALSHI_WS_URL
              value: wss://api.elections.kalshi.com/trade-api/ws/v2
            - name: BOT_BTC_1HR_KALSHI_REST_URL
              value: https://api.elections.kalshi.com/trade-api/v2

            # Path to the PEM file mounted from Secret Manager above.
            - name: BOT_BTC_1HR_KALSHI_PRIVATE_KEY_PATH
              value: /secrets/kalshi/kalshi-private-key

            # Tick archive directory — backed by the GCS FUSE mount above.
            - name: BOT_BTC_1HR_KALSHI_ARCHIVE_DIR
              value: /app/data/archive

            # Secrets exposed as env vars (non-PEM values — short strings).
            - name: BOT_BTC_1HR_KALSHI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: BOT_BTC_1HR_KALSHI_API_KEY
                  key: latest
            - name: BOT_BTC_1HR_KALSHI_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: BOT_BTC_1HR_KALSHI_ADMIN_TOKEN
                  key: latest

          startupProbe:
            # /healthz, not /readyz: the startup probe answers "is uvicorn
            # up?" — that's the Cloud Run restart contract. /readyz gates
            # on downstream feed health (Kalshi book populated, no breaker
            # tripped), which is a slower chain (spot WS → discovery →
            # Kalshi WS → first book snapshot) and doesn't fit the 2m5s
            # probe budget on cold start. Feed-health readiness is covered
            # separately by the livenessProbe on /healthz + app-level
            # activity logs; a stuck feed shows up as
            # feedloop.discovery_waiting_on_spot, not as a probe failure.
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            failureThreshold: 24
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            periodSeconds: 30
            failureThreshold: 3
  traffic:
    - percent: 100
      latestRevision: true
