# ============================================================================
# bot_btc_1hr_kalshi — Cloud Run env vars (NON-SECRET only)
# ============================================================================
# Import via: gcloud run services update bot-btc-1hr-kalshi --env-vars-file=deploy/env.yaml
# OR paste individual values in the GCP Console (Cloud Run → Edit & Deploy → Variables).
#
# Secrets (API keys, admin token) live in Secret Manager, NOT here.
# They are mounted at container boot via `--set-secrets` flag on the deploy.
# See docs/DEPLOYMENT.md §2.3.
# ============================================================================

BOT_BTC_1HR_KALSHI_MODE: "paper"                    # paper | shadow | live — gates real order placement
BOT_BTC_1HR_KALSHI_ENV: "prod"

# --- Feed endpoints (documented so we can point at staging/mock if needed) ---
BOT_BTC_1HR_KALSHI_WS_URL: "wss://trading-api.kalshi.com/trade-api/ws/v2"
BOT_BTC_1HR_KALSHI_REST_URL: "https://trading-api.kalshi.com/trade-api/v2"
BOT_BTC_1HR_KALSHI_COINBASE_WS_URL: "wss://ws-feed.exchange.coinbase.com"
BOT_BTC_1HR_KALSHI_BINANCE_WS_URL: "wss://stream.binance.com:9443/ws"
BOT_BTC_1HR_KALSHI_KRAKEN_WS_URL: "wss://ws.kraken.com/v2"

# --- Economic calendar (structured only — NLP is forbidden per RISK.md §6) ---
BOT_BTC_1HR_KALSHI_CALENDAR_PROVIDER: "tradingeconomics"
BOT_BTC_1HR_KALSHI_CALENDAR_POLL_INTERVAL_SEC: "60"
BOT_BTC_1HR_KALSHI_CALENDAR_PREEMPT_FLATTEN_SEC: "60"
BOT_BTC_1HR_KALSHI_CALENDAR_STABILIZE_MIN: "30"

# --- Risk policy (source of truth is docs/RISK.md; tune via PR label:param-tune) ---
BOT_BTC_1HR_KALSHI_BASE_ALLOCATION_PCT: "0.02"
BOT_BTC_1HR_KALSHI_MAX_PER_TRADE_PCT: "0.05"
BOT_BTC_1HR_KALSHI_HARD_DRAWDOWN_PCT: "0.15"
BOT_BTC_1HR_KALSHI_DAILY_LOSS_SOFT_PCT: "0.05"
BOT_BTC_1HR_KALSHI_DAILY_LOSS_HARD_PCT: "0.10"
BOT_BTC_1HR_KALSHI_MAX_CONCURRENT_POSITIONS: "3"
BOT_BTC_1HR_KALSHI_MAX_OPEN_ORDERS: "10"

# --- Position Monitor ---
BOT_BTC_1HR_KALSHI_EARLY_CASHOUT_THRESHOLD_CENTS: "99"
BOT_BTC_1HR_KALSHI_SOFT_STOP_FRACTION: "0.35"
BOT_BTC_1HR_KALSHI_SOFT_STOP_DEBOUNCE_SEC: "2"

# --- Execution ---
BOT_BTC_1HR_KALSHI_IOC_RUNG1_OFFSET_CENTS: "3"
BOT_BTC_1HR_KALSHI_IOC_RUNG2_OFFSET_CENTS: "6"
BOT_BTC_1HR_KALSHI_IOC_RUNG_TIMEOUT_MS: "400"
BOT_BTC_1HR_KALSHI_ABANDON_THRESHOLD_P_SETTLE: "0.60"
BOT_BTC_1HR_KALSHI_MAX_CONCURRENT_ABANDONED: "1"

# --- Breakers ---
BOT_BTC_1HR_KALSHI_MAX_CLOCK_DRIFT_MS: "250"
BOT_BTC_1HR_KALSHI_FEED_STALENESS_MS: "2000"
BOT_BTC_1HR_KALSHI_RECONCILE_INTERVAL_SEC: "60"
BOT_BTC_1HR_KALSHI_MAX_SEQ_GAPS_PER_5MIN: "3"

# --- Observability ---
BOT_BTC_1HR_KALSHI_LOG_LEVEL: "INFO"
BOT_BTC_1HR_KALSHI_BET_OUTCOMES_LOG_NAME: "bot_btc_1hr_kalshi.bet_outcomes"
BOT_BTC_1HR_KALSHI_BET_OUTCOMES_BQ_DATASET: "bot_btc_1hr_kalshi_bet_outcomes"
BOT_BTC_1HR_KALSHI_BET_OUTCOMES_BQ_TABLE: "outcomes"

# --- Tick archive ---
# Fill in the bucket name after setup_gcp.sh runs. Format: bot-btc-1hr-kalshi-tick-archive-<project>
BOT_BTC_1HR_KALSHI_TICK_ARCHIVE_BUCKET: ""
BOT_BTC_1HR_KALSHI_TICK_ARCHIVE_FLUSH_INTERVAL_SEC: "1800"

# --- Admin HTTP server (bound to :8080 — matches Cloud Run PORT contract) ---
BOT_BTC_1HR_KALSHI_ADMIN_HTTP_PORT: "8080"
