# Cloud Build config for the bot_btc_1hr_kalshi container image.
#
# The Dockerfile lives at deploy/Dockerfile (not the repo root), which means
# `gcloud builds submit --tag ...` does not work — it only looks for a
# Dockerfile at the build-context root. This config fixes the path with
# `docker build -f deploy/Dockerfile .` and publishes to Artifact Registry.
#
# Usage (from repo root):
#   gcloud builds submit \
#     --config cloudbuild.yaml \
#     --substitutions _REGION=$BOT_BTC_1HR_KALSHI_GCP_REGION \
#     .
#
# _REGION defaults to us-central1 (matches setup_gcp.sh default). Override via
# --substitutions when building into a non-default-region AR repo.

substitutions:
  _REGION: us-central1
  _REPO: bot-btc-1hr-kalshi
  _IMAGE: bot-btc-1hr-kalshi

steps:
  - name: gcr.io/cloud-builders/docker
    args:
      - build
      - -f
      - deploy/Dockerfile
      - -t
      - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest
      - .

images:
  - ${_REGION}-docker.pkg.dev/${PROJECT_ID}/${_REPO}/${_IMAGE}:latest
