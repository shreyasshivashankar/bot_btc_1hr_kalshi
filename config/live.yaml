# bot_btc_1hr_kalshi — LIVE config.
# DO NOT loosen thresholds without risk-committee sign-off (see docs/RISK.md).
# Promotion gates: backtest → paper ≥48h → shadow ≥24h → live (initial cap: 1 week).

mode: live

feeds:
  kalshi:
    ws_url_env:   BOT_BTC_1HR_KALSHI_WS_URL
    rest_url_env: BOT_BTC_1HR_KALSHI_REST_URL
    # Kalshi's hourly BTC books legitimately sit untouched by MMs for 12–18s
    # when underlying spot is flat — first paper soak (2026-04-19) observed
    # age_ms 10065–10216 on a 10s threshold, flapping repeatedly. Sized to
    # 30s with headroom: the breaker exists for *broken* tape, not *quiet*
    # tape. kalshi_parser.py drops ping/pong/control frames on purpose — we
    # track liquidity, not connectivity; a healthy WS with no book activity
    # still trips this budget. If spot moves, MMs reprice and emit deltas
    # immediately, so a dead socket still fails-closed within the window.
    staleness_halt_ms: 30000
  coinbase:
    ws_url: wss://ws-feed.exchange.coinbase.com
    staleness_halt_ms: 2000
  # Kraken is the confirmation venue (Binance geo-blocked from US Cloud Run).
  kraken:
    ws_url: wss://ws.kraken.com/v2
    staleness_halt_ms: 5000
  # Coinglass OI poller (Slice 11 P2 — SHADOW). Identical wiring to paper
  # — this stays observational in live until risk-committee sign-off.
  coinglass:
    enabled: true
    base_url: https://open-api-v4.coinglass.com
    oi_path: /api/futures/open-interest/aggregated-history
    symbol: BTC
    interval: 5m
    poll_interval_sec: 30.0
    api_key_env: BOT_BTC_1HR_KALSHI_COINGLASS_API_KEY

risk:
  kelly_fraction: 0.25            # ½-Kelly cap — hard ceiling
  max_position_notional_usd: 250  # initial ceiling; raise only after 1 live week
  max_daily_loss_pct: 0.03
  single_trade_drawdown_freeze_pct: 0.15
  reconcile_interval_sec: 60
  clock_drift_halt_ms: 1000       # RFC7231 Date header is second-truncated; ±500ms noise floor — see kalshi_rest.kalshi_date_header_probe
  # Multi-strike correlation cap: one YES (or NO) position per settlement
  # hour regardless of how many strikes are tracked. Three YES bets on
  # adjacent strikes of the same hour are structurally one directional bet
  # on BTC over the session — aggregate_notional alone doesn't enforce the
  # diversification intent because all N strikes settle from the same BTC
  # terminal price. Raise only after risk-committee review.
  max_correlated_positions: 1
  # Slice 11 Phase 3.1 — premium cap. Hard reject on 76¢+ entries: 3:1
  # inverted risk/reward clears Kelly math but not prudent practice. One
  # 75¢ loss erases three wins at the same price. Loosening requires
  # risk-committee sign-off (docs/RISK.md).
  max_entry_price_cents: 75
  # Slice 11 Phase 3.2 — inverted-risk sizing clip. At 50¢+ loss-per-
  # contract > win-per-contract and raw Kelly sizes UP (smaller 1-p).
  # Halve fractional Kelly in that band. Monotonic tightening; committee
  # sign-off required to change the multiplier toward 1.0.
  inverted_risk_threshold_cents: 50
  inverted_risk_kelly_multiplier: 0.5

signal:
  bollinger_period_bars: 20
  bollinger_std_mult: 2.0
  min_signal_confidence: 0.65
  # Implied-basis arb (Slice 10). Same thresholds as paper — promote with
  # explicit sign-off before loosening. See SignalSettings in config/settings.py.
  arb_basis_threshold_cents: 15
  arb_dead_spot_range_usd: 20.0

monitor:
  early_cashout_price_cents: 99
  soft_stop:
    base_fraction: 0.08
    regime_multiplier_high_vol: 1.25
    regime_multiplier_trending: 1.40
    time_multiplier_late_window: 0.70
  theta_net_book_depth_threshold: 0.5

execution:
  maker_only_entry: true          # hard rule #1
  ioc_ladder_cents: [3, 6]

telemetry:
  bet_outcomes_logger: bot_btc_1hr_kalshi.bet_outcomes
  bq_dataset: bot_btc_1hr_kalshi_bet_outcomes
  bq_table: outcomes

integrity:
  velocity_window_sec: 1.0
  active_disagreement_floor_usd: 25.0
  stale_halt_sec: 60.0

calendar:
  # Slice 11 P1 — Macro Blockers. See comments in paper.yaml. Live stays
  # strictly on US/High-impact prints; loosening requires risk-committee
  # sign-off (docs/RISK.md). A failed FF fetch keeps the prior event
  # list live — the refresher is fail-soft, never fail-open.
  lead_seconds: 60.0
  tick_interval_sec: 5.0
  fetch_enabled: true
  fetch_interval_sec: 1800.0
  tier_1_countries: ["USD"]
  tier_1_impacts: ["High"]
