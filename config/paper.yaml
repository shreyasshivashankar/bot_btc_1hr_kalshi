# bot_btc_1hr_kalshi — PAPER config.
# Live market data, simulated fills. Required 48h soak before promotion to live.

mode: paper

feeds:
  kalshi:
    ws_url_env:   BOT_BTC_1HR_KALSHI_WS_URL
    rest_url_env: BOT_BTC_1HR_KALSHI_REST_URL
    # Kalshi's hourly BTC books legitimately sit untouched by MMs for 12–18s
    # when underlying spot is flat — first paper soak (2026-04-19) observed
    # `age_ms` 10065–10216 on a 10s threshold, flapping 5× in 3 min. Sized
    # to 30s with headroom: the breaker exists for *broken* tape, not
    # *quiet* tape. kalshi_parser.py drops ping/pong/control frames on
    # purpose — we track liquidity, not connectivity; a healthy WS with no
    # book activity still trips this budget. If spot moves, MMs reprice and
    # emit deltas immediately, so a genuinely dead socket still fails-closed
    # within the window.
    staleness_halt_ms: 30000
  coinbase:
    ws_url: wss://ws-feed.exchange.coinbase.com
    staleness_halt_ms: 2000
  # Kraken is the confirmation venue (replaced Binance; Binance is geo-blocked
  # from US IPs incl. Cloud Run us-central1). Lower-volume than Coinbase, so a
  # larger staleness budget avoids spurious halts.
  kraken:
    ws_url: wss://ws.kraken.com/v2
    staleness_halt_ms: 5000
  # Coinglass open-interest poller (Slice 11 P2 — SHADOW mode only).
  # Observational: samples are logged and attached to MarketSnapshot but
  # no trap gates on OI yet. Pending paper-soak data + risk-committee
  # review before promotion to an entry gate. A dead poller does NOT
  # halt the container (non-critical supervisor) — third-party API
  # outage must not take the trading graph down with it.
  coinglass:
    enabled: true
    base_url: https://open-api-v4.coinglass.com
    oi_path: /api/futures/open-interest/aggregated-history
    symbol: BTC
    interval: 5m
    poll_interval_sec: 30.0
    api_key_env: BOT_BTC_1HR_KALSHI_COINGLASS_API_KEY

  # Coinglass liquidation-heatmap poller (Slice 11 P3 — shadow). Same
  # observational-only contract as the OI poller. Disabled by default;
  # the heatmap endpoint is paid-tier-only on most Coinglass plans and
  # unkeyed requests typically 401. Flip `enabled: true` once a key is
  # provisioned into the BOT_BTC_1HR_KALSHI_COINGLASS_API_KEY secret.
  coinglass_heatmap:
    enabled: false
    base_url: https://open-api-v4.coinglass.com
    heatmap_path: /api/futures/liquidation/aggregated-heatmap
    symbol: BTC
    interval: 1h
    poll_interval_sec: 60.0
    api_key_env: BOT_BTC_1HR_KALSHI_COINGLASS_API_KEY

  # Whale Alert poller (Slice 11 P4 — shadow only). Observational-only
  # exchange-inflow / outflow summary; no trap reads it yet. Disabled
  # by default; flip to true once BOT_BTC_1HR_KALSHI_WHALE_ALERT_API_KEY
  # is provisioned — the endpoint has no free-tier path so the boot
  # wiring refuses to start unkeyed (drops a warning in logs).
  whale_alert:
    enabled: false
    base_url: https://api.whale-alert.io
    path: /v1/transactions
    symbol: btc
    min_value_usd: 1000000
    poll_interval_sec: 60.0
    api_key_env: BOT_BTC_1HR_KALSHI_WHALE_ALERT_API_KEY

risk:
  # Sized for a $50 starter bankroll; bot restarts each session at $50 (see
  # --bankroll default in __main__.py). Per-position cap = bankroll / 2 so
  # at-most one position is open at full size. Intra-session the bot sizes
  # adaptively on remaining bankroll (losses shrink the next bet).
  kelly_fraction: 0.25
  max_position_notional_usd: 25
  max_daily_loss_pct: 0.15
  single_trade_drawdown_freeze_pct: 0.15
  reconcile_interval_sec: 60
  clock_drift_halt_ms: 1000   # RFC7231 Date header is second-truncated; ±500ms noise floor — see kalshi_rest.kalshi_date_header_probe
  # Multi-strike correlation cap: at most one YES (or NO) position per
  # settlement hour, regardless of how many strikes are tracked. Three YES
  # bets on adjacent strikes of the same hour are structurally one
  # directional bet — aggregate_notional alone can't enforce diversification
  # because all N strikes settle from the same BTC terminal price.
  max_correlated_positions: 1
  # Slice 11 Phase 3.1 — premium cap. Reject entries above 75¢: paying 75
  # to make 25 is a 3:1 inverted risk/reward that Kelly's (1-p) term
  # passes through cleanly but prudent practice does not. Monotonic
  # tightening; loosening requires risk-committee sign-off (docs/RISK.md).
  max_entry_price_cents: 75
  # Slice 11 Phase 3.2 — inverted-risk sizing clip. At 50¢+ the loss-per-
  # contract (price) exceeds the win-per-contract (1-price), and raw Kelly
  # actually sizes UP because (1-p) shrinks. Halving fractional Kelly in
  # that band is a monotonic tightening — the edge is unchanged, exposure
  # is halved. Paired with 3.1: 3.1 draws the ceiling, 3.2 scales exposure
  # inside the 50–75¢ corridor.
  inverted_risk_threshold_cents: 50
  inverted_risk_kelly_multiplier: 0.5

signal:
  bollinger_period_bars: 20
  bollinger_std_mult: 2.0
  min_signal_confidence: 0.60
  # Implied-basis arb (Slice 10). Fair value via Normal-CDF settlement model;
  # maker-buy the cheap side when mispricing is >= threshold_cents. Dead-spot
  # veto fires when the underlying's rolling 60s range exceeds
  # `arb_dead_spot_range_usd` — any basis during a sweep is adverse selection.
  arb_basis_threshold_cents: 15
  arb_dead_spot_range_usd: 20.0

monitor:
  early_cashout_price_cents: 99
  soft_stop:
    base_fraction: 0.10
    regime_multiplier_high_vol: 1.25
    regime_multiplier_trending: 1.40
    time_multiplier_late_window: 0.70
  theta_net_book_depth_threshold: 0.5

execution:
  maker_only_entry: true
  ioc_ladder_cents: [3, 6]

telemetry:
  bet_outcomes_logger: bot_btc_1hr_kalshi.bet_outcomes
  bq_dataset: bot_btc_1hr_kalshi_bet_outcomes
  bq_table: outcomes

integrity:
  # Primary (Coinbase) / Confirmation (Kraken) entry gate. See
  # signal/integrity.py. Veto only on ACTIVE disagreement — silence ≠ veto.
  velocity_window_sec: 1.0
  active_disagreement_floor_usd: 25.0   # noise floor; primary velocity below this is not "a move"
  stale_halt_sec: 60.0                  # fail-closed on broken confirmation feed

calendar:
  # Slice 11 P1 — Macro Blockers. Pull the US/High-impact print schedule
  # from the Forex Factory community mirror (no auth, no code changes on
  # schedule shifts). The pre-emptive flatten still fires at T-lead_seconds
  # (hard rule #8 / RISK.md §6). Static YAML via `path:` takes precedence
  # on name collisions — operators may override a stale FF entry without
  # editing upstream data. 30min refresh: FF updates at most weekly; this
  # is conservative but cheap. Widening `tier_1_impacts` beyond "High"
  # requires risk-committee sign-off — medium-impact prints historically
  # move BTC vol but not enough to justify a maker-only hour's flatten.
  lead_seconds: 60.0
  tick_interval_sec: 5.0
  fetch_enabled: true
  fetch_interval_sec: 1800.0
  tier_1_countries: ["USD"]
  tier_1_impacts: ["High"]
